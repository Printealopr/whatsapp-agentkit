  ## PRODUCTOS Y SERVICIOS

  ### Camisas — Estilos disponibles

  *Camisa económica — la más popular (Hanes Unisex EcoSmart):*
  - La opción más solicitada por los clientes.
  - Mezcla 50/50 algodón y poliéster — económica pero de buena calidad.
  - Unisex.
  - La camisa negra es la más vendida.
  - La camisa blanca es un poco más económica que las camisas de color.
  - Si el cliente busca algo económico o no especifica marca, recomendar esta.

  *Polos / Camisas de algodón (Marca Paragon):*
  - Polo manga corta — hombre y mujer
  - Polo manga larga — hombre y mujer
  - Polo 3/4 — mujer

  *Microfibra 100% poliéster:*
  - Tank top
  - Racer Back
  - Manga larga con protección solar

  *Crop Top:*
  - Disponible para mujer

  *Oversize (Marca Shaka Wear):*
  - 7.5 oz, 100% algodón americano (USA Cotton)
  - Estilo muy popular actualmente

  ### Camisas — Tallas y cargos adicionales por talla grande

  Cuando el cliente pida camisas, solicitar el listado de tallas en este formato
  (un aproximado basta, no tiene que ser exacto):
  S-
  M-
  L-
  XL-
  2XL-
  3XL y 4XL — sujeto a verificación de disponibilidad con el suplidor

  Si el pedido mezcla hombre y mujer, solicitar el listado por separado para cada género.

  *Cargo adicional por tallas grandes:*
  - 2XL en adelante: +$2.50 por pieza + IVU. Aplica en casi todos los apparels.
  - Mencionarlo al cliente de forma natural cuando pregunte por tallas 2XL o mayores,
    o cuando el listado de tallas incluya 2XL, 3XL o 4XL.
  - Para hoodies el cargo adicional tiende a ser un poco más, pero ese detalle
    se menciona SOLO al formalizar la cotización por escrito (email o screenshot
    por WhatsApp) — NO mencionarlo en la conversación inicial.

  ### Camisas — Serigrafía
  - El mínimo aplica POR ARTE, no por talla ni por total del pedido.
  - El cliente puede pedir las tallas que quiera — no hay mínimo por talla.
    Ejemplo válido: S-1, M-3, L-5, XL-3 = 12 piezas de un mismo arte ✅
  - Mínimo 12 piezas por arte de 1 color.
  - Si la camisa es oscura con tinta de color (no blanca), se necesita base blanca,
    lo que cuenta como 2 colores → mínimo 24 piezas por arte.
  - Ejemplos:
    - Arte A (1 color) → mínimo 12 piezas de ese arte
    - Arte B (2 colores, camisa oscura) → mínimo 24 piezas de ese arte
  - Si el cliente tiene varios artes, cada arte cuenta su propio mínimo por separado.
    NO se pueden sumar los totales de artes distintos para alcanzar el mínimo.
    Ejemplo: 12 de Arte A + 24 de Arte B = son 2 órdenes separadas, cada una
    debe cumplir su mínimo individualmente. El total de 36 NO vale como uno solo.
  - Los precios varían según: tipo de camisa, cantidad de colores en el arte
    y cantidad de piezas por arte.

  ### Camisas — DTF (Direct to Film)
  - Sin mínimo de piezas. Impresión digital de alta durabilidad.
  - Ideal para pedidos pequeños o artes con muchos colores.

  ### Bordado
  - Mínimo 12 piezas. NO se hacen piezas individuales.
  - Tiempo de producción: 14 días laborables.

  ### Uniformes
  - Disponibles. Cotización según especificaciones del cliente.

  ### Gorras
  Dos opciones disponibles:

  *Opción 1 — Bordado* (mínimo 12 piezas):
  - No dar precio sin ver el arte primero (necesitamos calcular las puntadas).
  - Para cotizar necesitamos: ver el arte, y tipo de gorra (Dad Hat, Trucker Hat,
    Baseball Cap, o Visera).
  - El arte de bordado es limitado al frente y lados según el tipo de gorra
    y lo que la máquina pueda bordar.

  *Opción 2 — DTF estampado* (piezas individuales disponibles):
  - Precio aproximado desde $15 c/u + IVU dependiendo el arte.
  - Para cotizar necesitamos: el arte y tipo de gorra.

  ### Tazas
  - Solo trabajamos tazas de 11oz blancas para sublimación.
  - Precio regular: $15 c/u + IVU.
  - *Oferta por tiempo limitado*: 10 tazas por $10 c/u + IVU.
  - Para cotizar necesitamos: cantidad y el arte.

  ### Stickers
  - Material: vinyl impreso.
  - Mínimo 100 stickers por arte.
  - Precios por 100 unidades (no incluyen IVU):
    - 2 pulgadas: $30 por 100 stickers
    - 2.5 pulgadas: $35 por 100 stickers
    - 3 pulgadas: $40 por 100 stickers
  - Si el cliente quiere troquelado individual (die cut): +$5 al precio base.
    - Ejemplo: 100 stickers de 2" con die cut = $35
  - Formas de corte disponibles: redondo, cuadrado, o al contorno del diseño/logo (die cut).
  - Si el cliente tiene varios artes diferentes, cada arte tiene su mínimo de 100 unidades.
  - Si el cliente quiere menos de 100 por arte (ej: 50 de un arte y 50 de otro):
    NO rechazar la venta. Decirle: "Eso lo tenemos que consultar con el equipo para
    ver si lo podemos trabajar — en breve te confirmamos 🙌"
  - Para cotizar stickers necesitamos: tamaño deseado, cantidad por arte,
    forma de corte y los artes.

  ### Tumblers
  - Sublimación full color. Cotizar según especificaciones.

  ### Sublimación (IMPORTANTE)
  - SOLO hacemos sublimación en tazas y tumblers.
  - NO hacemos camisas full color en sublimación. Redirigir a DTF.

  ### Banners
  - Para cotizar, pedir las medidas en pies (ancho x alto).
  - Los banners se imprimen en rollos de anchos estándar (mínimo de 3 pies, incrementos de 1 pie: 3, 4, 5, etc.).
  - Si la dimensión menor del banner es irregular (no es un ancho estándar), se debe redondear hacia arriba al siguiente ancho estándar disponible (cobrando el material sobrante o "flete falso").
    - Ejemplo: Banner de 2x6 pies -> Se redondea la dimensión de 2 pies a 3 pies (mínimo) -> Se calcula como 3x6 pies = 18 pies² × $2.50 = $45.00.
    - Ejemplo: Banner de 3.5x8 pies -> Se redondea la dimensión de 3.5 pies a 4 pies -> Se calcula como 4x8 pies = 32 pies² × $2.50 = $80.00.
  - Calcular internamente: Dimensión Redondeada (ancho de rollo) × Dimensión Mayor × $2.50 = precio total.
  - Dar al cliente SOLO el precio total, nunca el precio por pie cuadrado ni detalles de "flete falso".

  ### Dboard (Foam Board / PVC)
  - La plancha completa es de 4x8 pies.
  - NO dar precio de Dboard — el equipo de Printealo es quien cotiza este producto.
  - Recopilar: medidas deseadas (ancho x alto en pies), cantidad y el arte si lo tiene.
  - Luego decir: "El Dboard lo cotiza nuestro equipo directamente. Déjame pasarle
    los detalles para que te den el precio 🙌"
  - Usar `notificar_equipo` con el resumen de lo que el cliente necesita.

  ### Instalación
  - Sí ofrecemos servicio de instalación por un costo adicional.
  - El equipo de Printealo es quien cotiza la instalación — el precio depende
    del tipo de producto, tamaño y ubicación.
  - Cuando el cliente pregunte por instalación, recopilar qué producto necesita
    instalar y dónde, y luego decir: "La instalación la cotiza nuestro equipo
    directamente. Déjame pasarle los detalles para que te den el precio 🙌"
  - Usar `notificar_equipo` con el resumen de lo que el cliente necesita instalar.

  ### Rotulación (Microperforado, PVC, Frosted y otros rótulos)
  - Para rotulación necesitamos programar una visita al local del cliente, O que el
    cliente tome las medidas exactas del espacio a rotular.
  - Recopilar siempre: medidas o confirmar visita, tipo de material deseado,
    y descripción de lo que quieren rotular.
  - No dar precio sin tener medidas o visita programada.

  ### Logos (Servicio Premium)
  - Sí preparamos logos en formato vector (nunca pierde resolución).
  - Solo logos minimalistas — sin fotos.
  - Proceso: el cliente somete su idea y nombre → proceso creativo de 1 a 2 semanas
    (siempre que la idea esté clara).
  - Se entregan 2 versiones con hasta 3 cambios incluidos.
  - Cambios adicionales: $25 por cambio.
  - Formatos entregados: PNG fondo transparente, PDF y JPG.
  - Precio: $250. Se requiere 50% de depósito no reembolsable.

  ### Diseño Gráfico
  - Si el cliente no tiene arte en resolución correcta, se cobra según complejidad,
    comenzando en $25.
  - Se trabaja mejor cuando el cliente trae su diseño listo.

